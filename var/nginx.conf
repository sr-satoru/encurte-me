# Nginx Configuration for Redirecionador Web
#
# COMO USAR:
# 1. Copie este arquivo ou aponte o Nginx para ele.
# 2. Substitua '/var/www/redirecionador-web' pelo caminho real onde o projeto está no seu servidor.
# 3. Certifique-se de que o usuário do Nginx (www-data) tenha permissão de leitura nesta pasta.

server {
    listen 80;
    server_name seu-dominio.com; # Mude para seu domínio em produção

    # Frontend - Arquivos estáticos compilados (Vite build)
    # Certifique-se de rodar 'npm run build' no frontend primeiro
    root /home/encurte-me/frontend/dist;
    index index.html;

    # Suporte para roteamento de SPA (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para o Backend FastAPI
    location /api/ {
        # Redireciona para o backend na porta 8303 (conforme .env)
        # IMPORTANTE: Com barra no final para REMOVER o prefixo /api/
        proxy_pass http://127.0.0.1:8303/;
        
        # Configurações de Proxy
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Repasse de IPs reais
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout longo para processos pesados se necessário
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Otimização: Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Arquivos de log (dentro da pasta var do projeto)
    access_log /home/encurte-me/var/nginx_access.log;
    error_log /home/encurte-me/var/nginx_error.log;
}
